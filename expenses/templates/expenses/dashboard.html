<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4">💰 Personal Finance Tracker</h1>
        
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm p-4">
                    <h4 class="mb-3">Add New Expense</h4>
                    <form id="expenseForm">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" id="title" class="form-control" required placeholder="e.g., Grocery Shopping">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Amount ($)</label>
                            <input type="number" step="0.01" id="amount" class="form-control" required placeholder="0.00">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select id="category" class="form-select">
                                <option value="FOOD">Food & Dining</option>
                                <option value="RENT">Rent & Utilities</option>
                                <option value="ENTERTAINMENT">Entertainment</option>
                                <option value="TRAVEL">Travel & Transport</option>
                                <option value="MISC">Miscellaneous</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" id="date" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Expense</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm p-4 mb-4 bg-primary text-white text-center">
                    <h4>Total Spend: <span id="totalSpend">$0.00</span></h4>
                </div>

                <div class="card shadow-sm p-4">
                    <h4 class="mb-3">Transaction History</h4>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="expenseTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Automatically set today's date in the form input
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // Function 1: Fetch and display expenses asynchronously from our Django API
        async function loadExpenses() {
            const response = await fetch('/api/expenses/');
            const expenses = await response.json();
            
            let tableBody = document.getElementById('expenseTableBody');
            tableBody.innerHTML = '';
            let total = 0;

            expenses.forEach(item => {
                total += parseFloat(item.amount);
                tableBody.innerHTML += `
                    <tr>
                        <td>${item.date}</td>
                        <td><strong>${item.title}</strong></td>
                        <td><span class="badge bg-secondary">${item.category_display}</span></td>
                        <td class="text-danger">-$${parseFloat(item.amount).toFixed(2)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteExpense(${item.id})">🗑️</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalSpend').innerText = `$${total.toFixed(2)}`;
        }

        // Function 2: Handle form submission to POST data directly to Django API
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                title: document.getElementById('title').value,
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value,
                date: document.getElementById('date').value
            };

            const response = await fetch('/api/expenses/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                document.getElementById('title').value = '';
                document.getElementById('amount').value = '';
                loadExpenses(); // Refresh the list instantly without reloading the browser page!
            }
        });

        // Function 3: Delete an expense instantly via API call
        async function deleteExpense(id) {
            if (confirm('Are you sure you want to delete this expense record?')) {
                const response = await fetch(`/api/expenses/${id}/`, { method: 'DELETE' });
                if (response.ok) {
                    loadExpenses(); // Refresh the list instantly
                }
            }
        }

        // Run loadExpenses immediately on page load
        loadExpenses();
    </script>
</body>
</html>
